<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NexusTrack — Smarter Marketing Attribution powered by AI. Know exactly what's driving your growth.">
<meta name="theme-color" content="#080808">
<title>NexusTrack — Smarter Marketing Attribution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">
  <!-- Loading skeleton -->
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080808;">
    <div style="text-align:center;">
      <svg width="40" height="40" viewBox="0 0 34 34" fill="none" style="animation:pulse 1.5s ease-in-out infinite;">
        <rect width="34" height="34" rx="8" fill="rgba(74,140,110,0.12)" stroke="rgba(74,140,110,0.3)" stroke-width="1"/>
        <path d="M9 25L14 17L19 21L24 11" stroke="#4a8c6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="11" r="2.5" fill="#4a8c6e"/>
      </svg>
    </div>
  </div>
</div>
<style>
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
<script src="/js/app.js" defer></script>
</body>
</html>
